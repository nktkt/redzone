name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build pass + run test suite
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and CMake
        run: brew install llvm cmake

      - name: Put LLVM tools on PATH
        # Homebrew LLVM is keg-only, so its clang/opt/llvm-config aren't on PATH
        # by default. The build scripts call them unqualified.
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          clang --version
          opt --version
          cmake --version

      - name: Build the pass and run the test suite
        # test.sh builds build/libRedzonePass.so on first run, then instruments
        # and runs every example, asserting the expected outcome.
        run: ./scripts/test.sh

      - name: Validate machine-readable output formats
        # test_formats.sh re-builds the examples into a temp dir and checks that
        # REDZONE_FORMAT=json / =sarif emit well-formed findings with the right
        # error-kind / ruleId (and that a clean program emits none).
        run: ./scripts/test_formats.sh

      - name: Build-system integration examples
        # Exercise both the CMake and Make integration recipes end to end. The
        # pass plugin (build/libRedzonePass.so) already exists from the earlier
        # test.sh step. Each example builds a deliberately-buggy program that
        # must abort (nonzero exit) and report a heap-buffer-overflow on stderr.
        run: |
          set -u
          fail=0
          EXPECT='==redzone ERROR: heap-buffer-overflow'

          # Run a binary, capturing stderr; assert nonzero exit AND the expected
          # redzone error string. $1 = label, rest = command to run.
          check() {
            label="$1"; shift
            err="$(mktemp)"
            # The demo aborts (SIGABRT) on purpose. The default `run:` shell is
            # `bash -e`, so capture the status via `|| ec=$?` (an || list is
            # exempt from errexit) -- a bare `; ec=$?` would let the abort kill
            # the step before the status is read.
            ec=0
            "$@" >/dev/null 2>"$err" || ec=$?
            if [ "$ec" -ne 0 ] && grep -qF "$EXPECT" "$err"; then
              echo "PASS: $label (exit=$ec, found '$EXPECT')"
            else
              echo "FAIL: $label (exit=$ec)"
              echo "----- stderr -----"
              cat "$err"
              echo "------------------"
              fail=1
            fi
            rm -f "$err"
          }

          echo "== CMake example =="
          cmake -S integration/cmake-example -B /tmp/rz-cmake \
                -DCMAKE_C_COMPILER="$(brew --prefix llvm)/bin/clang"
          cmake --build /tmp/rz-cmake
          check "cmake-example" /tmp/rz-cmake/demo

          echo "== Make example =="
          make -C integration/make-example
          check "make-example" ./integration/make-example/demo

          exit "$fail"
