name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build pass + run test suite
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM, CMake, ccache, and sccache
        run: brew install llvm cmake ccache sccache

      - name: Put LLVM tools on PATH
        # Homebrew LLVM is keg-only, so its clang/opt/llvm-config aren't on PATH
        # by default. The build scripts call them unqualified.
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          clang --version
          opt --version
          cmake --version

      - name: Build the pass and run the test suite
        # test.sh builds build/libRedzonePass.so on first run, then instruments
        # and runs every example, asserting the expected outcome.
        run: ./scripts/test.sh

      - name: Differential test vs AddressSanitizer
        # Build a curated subset of the corpus with -fsanitize=address and assert
        # ASan reaches the same verdict redzone does (test.sh locks redzone's).
        run: ./scripts/test_diff_asan.sh

      - name: Whole-process interposition (experimental, macOS)
        # An overflow on memory from an UNINSTRUMENTED library is missed normally
        # but caught under DYLD_INSERT_LIBRARIES; a correct program stays clean.
        run: ./scripts/test_interpose.sh

      - name: Validate machine-readable output formats
        # test_formats.sh re-builds the examples into a temp dir and checks that
        # REDZONE_FORMAT=json / =sarif emit well-formed findings with the right
        # error-kind / ruleId (and that a clean program emits none).
        run: ./scripts/test_formats.sh

      - name: Cross-TU external-global test
        # Proves external globals stay ABI-safe: an un-instrumented translation
        # unit must read the wrapped symbol's data correctly (its address is
        # preserved), and an overflow of it is still detected.
        run: ./scripts/test_cross_tu.sh

      - name: Rich-report tests (stack traces + suppressions)
        # Asserts error reports carry a symbolized stack trace (text and JSON)
        # and that REDZONE_SUPPRESSIONS silences a matching leak.
        run: ./scripts/test_reports.sh

      - name: Per-function opt-out
        # REDZONE_NO_INSTRUMENT excludes a function from access checking: the same
        # overflow is caught without it and allowed with it.
        run: ./scripts/test_optout.sh

      - name: Ignore-list
        # REDZONE_IGNORELIST fun:/src: rules exclude matching functions/files;
        # the same overflow is caught without a rule and allowed when one matches.
        run: ./scripts/test_ignorelist.sh

      - name: Race-engine unit test
        # The happens-before core of the (in-progress) data-race detector:
        # deterministic vector-clock + state-machine scenarios, no OS threads.
        # See docs/design/data-race-detection.md.
        run: ./scripts/test_race_engine.sh

      - name: Race-runtime test
        # The runtime glue driving the detector from REAL pthreads (TLS clocks,
        # mutex/create/join wrappers). Run many times: assertions are
        # timing-independent, so every run must pass (a flaky run fails CI).
        run: ./scripts/test_race_runtime.sh

      - name: Race-runtime under ThreadSanitizer
        # Builds the detector runtime + a race-free concurrent driver under TSan:
        # any warning means the sharded-shadow locking has an internal data race.
        # Skips cleanly if TSan is unavailable on the toolchain.
        run: ./scripts/test_race_tsan.sh

      - name: Race-mode end-to-end test
        # Full path: the pass auto-emits the access/sync hooks (-redzone-race),
        # linked against the race runtime. A racy program must be flagged, a
        # mutex-protected one must run clean (no false positive). Run repeatedly.
        run: ./scripts/test_race_e2e.sh

      - name: Race-mode benchmark (correctness + perf numbers)
        # Times race mode vs baseline on race-free microbenchmarks. Perf is
        # informational (heavy opt-in mode); the gate is correctness -- the
        # instrumented build must match the baseline and report no race.
        run: ./scripts/bench_race.sh

      - name: Reproducible-build (determinism) check
        # Instrumenting the same source twice must yield byte-identical objects --
        # the prerequisite for compiler caches and reproducible builds.
        run: ./scripts/test_determinism.sh

      - name: ccache compatibility
        # Instrumented compiles are cacheable and correct, and listing the plugin
        # in CCACHE_EXTRAFILES makes a plugin rebuild bust the cache.
        run: ./scripts/test_ccache.sh

      - name: sccache compatibility
        # Same, for sccache: cacheable and correct, and a versioned plugin path
        # (sccache has no CCACHE_EXTRAFILES) misses cleanly.
        run: ./scripts/test_sccache.sh

      - name: Build-system integration examples
        # Exercise both the CMake and Make integration recipes end to end. The
        # pass plugin (build/libRedzonePass.so) already exists from the earlier
        # test.sh step. Each example builds a deliberately-buggy program that
        # must abort (nonzero exit) and report a heap-buffer-overflow on stderr.
        run: |
          set -u
          fail=0
          EXPECT='==redzone ERROR: heap-buffer-overflow'

          # Run a binary, capturing stderr; assert nonzero exit AND the expected
          # redzone error string. $1 = label, rest = command to run.
          check() {
            label="$1"; shift
            err="$(mktemp)"
            # The demo aborts (SIGABRT) on purpose. The default `run:` shell is
            # `bash -e`, so capture the status via `|| ec=$?` (an || list is
            # exempt from errexit) -- a bare `; ec=$?` would let the abort kill
            # the step before the status is read.
            ec=0
            "$@" >/dev/null 2>"$err" || ec=$?
            if [ "$ec" -ne 0 ] && grep -qF "$EXPECT" "$err"; then
              echo "PASS: $label (exit=$ec, found '$EXPECT')"
            else
              echo "FAIL: $label (exit=$ec)"
              echo "----- stderr -----"
              cat "$err"
              echo "------------------"
              fail=1
            fi
            rm -f "$err"
          }

          echo "== CMake example =="
          cmake -S integration/cmake-example -B /tmp/rz-cmake \
                -DCMAKE_C_COMPILER="$(brew --prefix llvm)/bin/clang"
          cmake --build /tmp/rz-cmake
          check "cmake-example" /tmp/rz-cmake/demo

          echo "== Make example =="
          make -C integration/make-example
          check "make-example" ./integration/make-example/demo

          exit "$fail"

      - name: Performance regression check
        # Reuses the pass plugin built by the test-suite step. bench.sh --check
        # asserts, per benchmark, that the static check count stays within budget
        # and the runtime slowdown stays under a (deliberately loose) ceiling, so
        # this catches order-of-magnitude regressions without flaking on CI noise.
        # See docs/benchmarks.md for the thresholds and rationale.
        run: ./scripts/bench.sh --check
